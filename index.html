<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Sayfa</title>
    <style>
        /* Genel Sayfa Tasarımı ve Resetleme */
        * {
            box-sizing: border-box; /* Taşmaları önleyen en kritik kural */
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh; /* Sabit height yerine min-height taşmayı önler */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px; /* Küçük ekranlarda kenarlara yapışmasın */
        }

        /* Ana Kart Alanı */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px; /* Geniş ekranlarda çok büyümesini engeller */
        }

        h1 {
            margin-bottom: 30px;
            font-size: calc(1.8rem + 1vw); /* Ekrana göre otomatik büyüyen yazı */
        }

        /* Buton Grubu */
        .btn-group {
            display: flex;
            flex-direction: column; /* Mobilde alt alta gelsinler */
            gap: 15px; /* Butonlar arası boşluk */
        }

        /* Buton Tasarımları */
        .btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s, transform 0.2s;
            font-weight: bold;
            width: 100%; /* İçinde bulunduğu kutuyu kaplasın */
        }

        .btn:hover {
            background-color: #45a049;
            transform: scale(1.02);
        }

        .btn-kdu {
            background-color: #008CBA;
        }

        .btn-kdu:hover {
            background-color: #007bb5;
        }

        /* Pop-up (Modal) Dış Alanı */
        .modal {
            display: none; 
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            padding: 20px; /* Mobilde pop-up kenarlardan taşmasın */
        }

        /* Pop-up İçerik Kartı */
        .modal-content {
            background-color: #ffffff;
            color: #333;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px; /* Bilgisayarda maksimum genişlik */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
            text-align: left;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
        }

        .close-btn:hover {
            color: black;
        }

        .modal-content h2 {
            margin-top: 0;
            color: #1e3c72;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        /* Form Elemanları */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px; /* Mobilde inputa tıklayınca yakınlaştırma yapmasın diye ideal boyut */
        }

        .submit-btn {
            width: 100%;
            background-color: #1e3c72;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #2a5298;
        }

        #error-msg {
            color: red;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        /* --- BÜYÜK EKRANLAR İÇİN AYAR (Masaüstü) --- */
        @media (min-width: 768px) {
            .btn-group {
                flex-direction: row; /* Butonları yan yana getir */
                justify-content: center;
            }
            .btn {
                width: auto; /* Butonlar kendi yazısı kadar yer kaplasın */
                min-width: 180px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistem Girişi</h1>
        <div class="btn-group">
            <button class="btn" onclick="openLoginModal('ucussayfasi.html')">Uçuş Defterim</button>
            <button class="btn btn-kdu" onclick="openLoginModal('kdusayfasi.html')">KDU</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>Giriş Yapın</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Kullanıcı ID</label>
                    <input type="text" id="username" required placeholder="Kullanıcı adınız">
                </div>
                <div class="input-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" required placeholder="******">
                </div>
                <button type="submit" class="submit-btn">Doğrula ve Devam Et</button>
                <div id="error-msg">Hatalı Kullanıcı ID veya Şifre!</div>
            </form>
        </div>
    </div>

    <script>
        let targetPage = ''; 

        function openLoginModal(page) {
            targetPage = page; 
            document.getElementById('loginModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('loginForm').reset();
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const backendUrl = 'http://localhost:5000/api/login'; 

                const response = await fetch(backendUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = targetPage; 
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = data.message || "Hatalı giriş bilgileri!";
                }

            } catch (error) {
                console.error("Sistem hatası:", error);
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Sunucuya bağlanılamadı.";
            }
        });
    </script>
</body>
</html>
