<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçuş Yönetim Sistemi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 450px;
            width: 90%;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #00d2ff;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .btn {
            background: #00d2ff;
            color: #1e3c72;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: #fff;
            color: #1e3c72;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.4);
        }

        /* POP-UP MODAL TASARIMI */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #ffffff;
            color: #333;
            padding: 2.5rem;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: scale(0.7);
            transition: all 0.3s ease;
            position: relative;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h2 {
            margin-bottom: 1.5rem;
            color: #1e3c72;
            font-size: 1.5rem;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #ff4d4d;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #1e3c72;
        }

        .modal .btn-submit {
            background: #1e3c72;
            color: #fff;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.3);
        }

        .modal .btn-submit:hover {
            background: #2a5298;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <i class="fas fa-plane-departure"></i>
        </div>
        <h1>Uçuş Yönetim Sistemi</h1>
        <button class="btn" onclick="toggleModal(true)">
            <i class="fas fa-book"></i> Uçuş Defterim
        </button>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <span class="close-btn" onclick="toggleModal(false)">&times;</span>
            <h2><i class="fas fa-lock"></i> Kaptan Girişi</h2>
            
            <div class="input-group">
                <label for="usernameInput">Kullanıcı ID</label>
                <input type="text" id="usernameInput" placeholder="Kullanıcı adınızı girin">
            </div>

            <div class="input-group">
                <label for="passwordInput">Şifre</label>
                <input type="password" id="passwordInput" placeholder="Sistem şifrenizi girin">
            </div>

            <button class="btn btn-submit" onclick="ucusDefterineGit()">
                Doğrula ve Devam Et
            </button>
        </div>
    </div>

    <script>
        // Modal açma/kapama fonksiyonu
        function toggleModal(show) {
            const modal = document.getElementById('loginModal');
            if (show) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
                // Kapatıldığında girdileri temizle
                document.getElementById('usernameInput').value = '';
                document.getElementById('passwordInput').value = '';
            }
        }

        // Backend ile konuşup giriş doğrulaması yapan fonksiyon
        async function ucusDefterineGit() {
            const usernameInput = document.getElementById('usernameInput').value.trim();
            const passwordInput = document.getElementById('passwordInput').value.trim();

            // Alanların boş olup olmadığını kontrol etme
            if (!usernameInput || !passwordInput) {
                alert("Lütfen kullanıcı adı ve şifre alanlarını doldurun!");
                return;
            }

            try {
                // Kendi bilgisayarımızda çalışan Backend API'sine istek atıyoruz
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert("Giriş başarılı! Uçuş sayfasına yönlendiriliyorsunuz...");
                    // Başarılı girişte yönlendirilecek sayfa:
                    window.location.href = 'ucussayfasi.html';
                } else {
                    // Sunucudan (server.js) gelen hata mesajını gösterir
                    alert(data.message || "Giriş başarısız!");
                }

            } catch (error) {
                console.error("Bağlantı hatası:", error);
                alert("Sunucuya bağlanılamadı! Lütfen terminalde backend sunucunuzun (node server.js) çalıştığından emin olun.");
            }
        }
    </script>
</body>
</html>
