<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Sayfa</title>
    <style>
        /* Genel Sayfa Tasarımı */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        /* Buton Tasarımları */
        .btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s, transform 0.2s;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        .btn-kdu {
            background-color: #008CBA;
        }

        .btn-kdu:hover {
            background-color: #007bb5;
        }

        /* Pop-up (Modal) Tasarımı */
        .modal {
            display: none; /* Başlangıçta gizli */
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #ffffff;
            color: #333;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
            text-align: left;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }

        .close-btn:hover {
            color: black;
        }

        .modal-content h2 {
            margin-top: 0;
            color: #1e3c72;
        }

        /* Form Elemanları */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            background-color: #1e3c72;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .submit-btn:hover {
            background-color: #2a5298;
        }

        #error-msg {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistem Girişi</h1>
        <button class="btn" onclick="openLoginModal('ucussayfasi.html')">Uçuş Defterim</button>
        <button class="btn btn-kdu" onclick="openLoginModal('kdusayfasi.html')">KDU</button>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>Giriş Yapın</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Kullanıcı ID (E-posta/Ad)</label>
                    <input type="text" id="username" required placeholder="Kullanıcı adınız">
                </div>
                <div class="input-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" required placeholder="******">
                </div>
                <button type="submit" class="submit-btn">Doğrula ve Devam Et</button>
                <div id="error-msg">Hatalı Kullanıcı ID veya Şifre!</div>
            </form>
        </div>
    </div>

    <script>
        let targetPage = ''; // Kullanıcının gitmek istediği sayfa adresi

        // Pop-up Ekranını Açar
        function openLoginModal(page) {
            targetPage = page; // Gitmek istediği sayfayı hafızaya alıyoruz
            document.getElementById('loginModal').style.display = 'flex';
        }

        // Pop-up Ekranını Kapatır
        function closeModal() {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('loginForm').reset();
        }

        // Form Gönderildiğinde (Giriş Butonuna Basıldığında)
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Sayfanın yenilenmesini engelle

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                // RENDER BACKEND API ADRESİNİZ (Canlıya geçince burayı Render linkinizle değiştireceksiniz)
                // Örn: https://projeniz.onrender.com/api/login
                const backendUrl = 'http://localhost:5000/api/login'; 

                // Arka yüze (Backend) verileri güvenli şekilde gönderiyoruz
                const response = await fetch(backendUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // MongoDB'den onay geldi! Giriş başarılı.
                    // Kullanıcıyı gitmek istediği sayfaya yönlendiriyoruz.
                    window.location.href = targetPage; 
                } else {
                    // Veri tabanında eşleşme bulunamadı veya şifre yanlış
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = data.message || "Hatalı giriş bilgileri!";
                }

            } catch (error) {
                console.error("Sistem hatası:", error);
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Sunucuya bağlanılamadı. Lütfen backend'in açık olduğundan emin olun.";
            }
        });
    </script>
</body>
</html>
