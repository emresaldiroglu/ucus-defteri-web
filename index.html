<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çevrimdışı Uçuş Defteri</title>

    <!-- CSS Stil Kodları -->
    <style>
        :root {
            --bg-color: #f0f2f5;
            --surface-color: #ffffff;
            --text-primary: #1c1c1e;
            --text-secondary: #6e6e73;
            --primary-color: #007aff;
            --danger-color: #ff3b30;
            --border-color: #e5e5ea;
            --border-radius: 12px;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
        }

        /* Koyu Tema Renkleri */
        .dark-theme {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-primary: #e1e1e1;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            --primary-color: #0a84ff;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 30px auto;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .form-container, .list-container {
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .list-container {
            display: flex;
            flex-direction: column; /* h3 ve ul'yi alt alta sırala */
        }
        .list-container h3 {
            margin: 0 0 10px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.2em;
            color: var(--text-primary);
        }
        .list-container > h3 {
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }
        #ozetBilgiler {
            padding: 25px 20px;
            background: linear-gradient(45deg, var(--primary-color), #005ae0);
            color: white;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
            font-size: 1.4em;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        #ozetBilgiler strong {
            display: block;
            font-size: 1.8em;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        #ucusListesi {
            list-style-type: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
            max-height: 500px; /* Başlangıçta bir yükseklik verelim */
            transition: max-height 0.4s ease-in-out, margin-top 0.4s ease-in-out;
        }
        #ucusListesi li {
            border-bottom: 1px solid #e5e5ea;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }
        #ucusListesi li .info {
            display: flex;
            flex-direction: column;
        }
        #ucusListesi li .info strong {
            font-size: 1.1em;
            color: var(--text-primary);
        }
        #ucusListesi li .info small {
            color: var(--text-secondary);
        }

        .delete-btn {
            background-color: var(--danger-color);
            opacity: 0.6;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            line-height: 20px;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }
        #ucusListesi li:hover .delete-btn {
            opacity: 1;
        }
        #ucusForm {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background-color: var(--bg-color);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2);
            background-color: white;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 12px 20px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            flex-grow: 1;
        }
        #kaydetBtn { background-color: var(--primary-color); }
        #kaydetBtn:hover { background-color: #005bb5; }
        
        #yeniBtn { background-color: #6c757d; }
        #yeniBtn:hover { background-color: #5a6268; }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        #theme-toggle-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1em;
            flex-shrink: 0;
            padding: 0;
        }

        h3#formBaslik {
            font-weight: 600;
        }
        /* Uçuş Saati Girişi için özel stiller */
        .time-input-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .time-input-container input {
            padding-right: 45px; /* Buton için yer aç */
        }
        #saatSecBtn {
            position: absolute;
            right: 5px;
            width: 30px;
            height: 30px;
            padding: 0;
            font-size: 18px;
            line-height: 30px;
            border-radius: 5px;
            background-color: #e9ecef;
            color: #555;
            border: 1px solid #ccc;
        }
        #saatSecenekleri {
            display: none; /* Başlangıçta gizli */
            position: absolute;
            top: 100%;
            left: 0;
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            z-index: 10;
            padding: 5px;
        }
        #saatSecenekleri button {
            display: flex;
            width: 100%;
            background-color: transparent;
            color: var(--text-color);
            text-align: left;
            padding: 8px 12px;
            font-size: 14px;
        }
        #saatSecenekleri button:hover {
            background-color: #f0f0f5;
        }

        /* Telefon ve küçük ekranlar için Responsive Tasarım Kuralları */
        @media (max-width: 768px) {
            .container {
                margin: 0;
                border-radius: 0;
                border: none;
                box-shadow: none;
                margin: 0;
            }
            #ozetBilgiler {
                border-radius: 0;
            }
        }

    </style>
</head>
<body>

    <!-- Giriş/Kayıt Ekranı -->
    <div id="auth-container" class="container" style="max-width: 400px; margin: 50px auto;">
        <div class="form-container">
            <h3 id="auth-title">Giriş Yap</h3>
            <form id="auth-form">
                <label for="username">Kullanıcı Adı:</label>
                <input type="text" id="username" required>
                <label for="password">Şifre:</label>
                <input type="password" id="password" required>
                <div class="button-group">
                    <button type="submit" id="auth-submit-btn">Giriş Yap</button>
                </div>
                <p id="auth-switch-text" style="text-align: center; margin-top: 15px;">Hesabın yok mu? <a href="#" id="auth-switch-link">Kayıt Ol</a></p>
            </form>
            <p id="auth-error" style="color: red; text-align: center;"></p>
        </div>
    </div>

    <!-- Ana Uygulama Ekranı (Başlangıçta Gizli) -->
    <div id="app-container" style="display: none;">
        <div class="app-header" style="padding: 10px 20px; background-color: #fff; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
            <span id="welcome-user"></span>
            <button id="logout-btn" style="background-color: var(--danger-color); font-size: 14px; padding: 8px 12px;">Çıkış Yap</button>
        </div>

    <div class="container">
        <div id="ozetBilgiler" title="Tüm uçuşlarınızın toplam süresi">
            <!-- Toplam uçuş saati buraya eklenecek -->
        </div>

        <div class="form-container">
            <div class="form-header">
                <h3 id="formBaslik">Yeni Uçuş Ekle</h3>
                <button id="theme-toggle-btn" title="Temayı Değiştir">🌙</button>
            </div>
            <form id="ucusForm">
                <input type="hidden" id="ucusId"> <!-- Güncelleme için gizli alan -->

                <label for="ucusTarihi">Uçuş Tarihi:</label>
                <input type="date" id="ucusTarihi" required>

                <label for="havaAraciTipi">Hava Aracı Tipi:</label>
                <input type="text" id="havaAraciTipi" placeholder="örn: Cessna 172" required>

                <label for="ucusTipi">Uçuş Tipi:</label>
                <input type="text" id="ucusTipi" placeholder="örn: PPL, Gece, Alet" required>

                <label for="ucusSaati">Uçuş Saati (HH:mm):</label>
                <div class="time-input-container">
                    <input type="text" id="ucusSaati" placeholder="örn: 01:30" required>
                    <button type="button" id="saatSecBtn" title="Hazır Saatler">🕒</button>
                    <div id="saatSecenekleri">
                        <button type="button" data-saat="00:30">00:30</button>
                        <button type="button" data-saat="01:00">01:00</button>
                        <button type="button" data-saat="01:30">01:30</button>
                        <button type="button" data-saat="02:00">02:00</button>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" id="yeniBtn">Yeni Kayıt</button>
                    <button type="submit" id="kaydetBtn">Kaydet</button>
                </div>
            </form>
        </div>

        <div class="list-container">
            <h3>Kayıtlı Uçuşlar</h3>
            <ul id="ucusListesi"></ul>
        </div>
    </div>
    </div>

    <!-- JavaScript Uygulama Mantığı -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // HTML elementlerini seç
            const ucusForm = document.getElementById('ucusForm');
            const ucusListesi = document.getElementById('ucusListesi');
            const kaydetBtn = document.getElementById('kaydetBtn');
            const yeniBtn = document.getElementById('yeniBtn');
            const formBaslik = document.getElementById('formBaslik');
            const ucusIdInput = document.getElementById('ucusId');
            const ozetBilgiler = document.getElementById('ozetBilgiler');
            const saatSecBtn = document.getElementById('saatSecBtn');
            const themeToggleBtn = document.getElementById('theme-toggle-btn');
            const saatSecenekleri = document.getElementById('saatSecenekleri');
            const authContainer = document.getElementById('auth-container');
            const appContainer = document.getElementById('app-container');
            const authForm = document.getElementById('auth-form');
            const authTitle = document.getElementById('auth-title');
            const authSubmitBtn = document.getElementById('auth-submit-btn');
            const authSwitchLink = document.getElementById('auth-switch-link');
            const authSwitchText = document.getElementById('auth-switch-text');
            const authError = document.getElementById('auth-error');
            const logoutBtn = document.getElementById('logout-btn');
            const welcomeUser = document.getElementById('welcome-user');
            const listContainerH3 = document.querySelector('.list-container > h3');
            const ucusSaatiInput = document.getElementById('ucusSaati');

            const STORAGE_KEY = 'ucusDefteriVerileri_v2'; // Anahtar adı değiştirildi
            let ucuslar = [];
            
            // 1. VERİLERİ YÖNETME FONKSİYONLARI
            //-------------------------------------

            // Tema Fonksiyonları
            function temaUygula(tema) {
                if (tema === 'dark') {
                    document.body.classList.add('dark-theme');
                    themeToggleBtn.textContent = '☀️';
                } else {
                    document.body.classList.remove('dark-theme');
                    themeToggleBtn.textContent = '🌙';
                }
            }

            function temaDegistir() {
                const mevcutTema = document.body.classList.contains('dark-theme') ? 'light' : 'dark';
                temaUygula(mevcutTema);
                localStorage.setItem('ucusDefteriTemasi', mevcutTema);
            }

            // 1. VERİLERİ YÖNETME FONKSİYONLARI
            //-------------------------------------

            // Verileri sunucudan (API'den) yükler
            async function verileriYukle() {
                const token = localStorage.getItem('token');
                if (!token) return;

                try {
                    const response = await fetch('/api/flights', {
                        headers: { 'x-auth-token': token }
                    });
                    if (!response.ok) {
                        // Token geçersizse çıkış yap
                        cikisYap();
                        throw new Error('Yetkilendirme hatası');
                    }
                    ucuslar = await response.json();
                    renderUcuslar();
                } catch (error) {
                    console.error("Veri yükleme hatası:", error);
                }
            }

            // Verileri LocalStorage'a kaydeder
            async function verileriKaydet(ucus, method = 'POST', id = '') {
                const token = localStorage.getItem('token');
                const url = id ? `/api/flights/${id}` : '/api/flights';
                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'x-auth-token': token
                        },
                        body: JSON.stringify(ucus)
                    });
                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.message || 'Kayıt işlemi başarısız.');
                    }
                    return await response.json();
                } catch (error) {
                    console.error("Kayıt/Güncelleme hatası:", error);
                }
            }

            // 2. ARAYÜZÜ GÜNCELLEME FONKSİYONLARI
            //-------------------------------------------------

            function sureyiDakikayaCevir(sure) {
                if (!sure || !sure.includes(':')) return 0;
                try {
                    const [saat, dakika] = sure.split(':').map(Number);
                    return (saat * 60) + dakika;
                } catch {
                    return 0;
                }
            }

            function toplamSuresiniHesaplaVeGoster() {
                const toplamDakika = ucuslar.reduce((toplam, ucus) => toplam + sureyiDakikayaCevir(ucus.ucusSaati), 0);
                
                const toplamSaat = Math.floor(toplamDakika / 60);
                const kalanDakika = toplamDakika % 60;

                const formatliSure = `${toplamSaat.toString().padStart(2, '0')}:${kalanDakika.toString().padStart(2, '0')}`;
                ozetBilgiler.innerHTML = `Toplam Uçuş: <strong>${formatliSure}</strong>`;
            }

            // Uçuş listesini ekranda yeniden çizer
            function renderUcuslar() {
                ucusListesi.innerHTML = ''; // Listeyi temizle
                if (ucuslar.length === 0) {
                    ucusListesi.innerHTML = '<li>Henüz kayıtlı uçuş yok.</li>';
                    toplamSuresiniHesaplaVeGoster();
                    return;
                }

                // Uçuşları tarihe göre en yeniden en eskiye sırala
                const siraliUcuslar = [...ucuslar].sort((a, b) => new Date(b.ucusTarihi) - new Date(a.ucusTarihi));

                siraliUcuslar.forEach((ucus) => {
                    const li = document.createElement('li');
                    li.dataset.id = ucus._id; // Her bir elemana ID ata
                    li.innerHTML = `
                        <div class="info">
                            <strong>${ucus.havaAraciTipi} (${ucus.ucusTipi})</strong>
                            <small>${new Date(ucus.ucusTarihi).toLocaleDateString()}</small>
                        </div>
                        <div class="time">${ucus.ucusSaati}</div>
                        <button class="delete-btn" title="Sil">X</button>
                    `;
                    
                    // Listeden bir elemana tıklanınca formu doldur
                    li.addEventListener('click', (e) => {
                        if (e.target.classList.contains('delete-btn')) return;
                        formuDoldur(ucus._id);
                    });

                    li.querySelector('.delete-btn').addEventListener('click', () => {
                        // Silme onayı iste
                        if (confirm(`'${ucus.havaAraciTipi}' uçuşunu silmek istediğinizden emin misiniz?`)) {
                            ucusSil(ucus._id);
                        }
                    });

                    ucusListesi.appendChild(li);
                });
                
                // Seçili olanı işaretle
                const seciliId = ucusIdInput.value;
                if (seciliId) {
                    const seciliLi = ucusListesi.querySelector(`li[data-id='${seciliId}']`);
                    if (seciliLi) {
                        seciliLi.classList.add('selected');
                    }
                }

                toplamSuresiniHesaplaVeGoster();
            }
            
            // Formu temizleyip "Yeni Kayıt" moduna geçer
            function formuTemizle() {
                ucusForm.reset();
                ucusIdInput.value = '';
                formBaslik.textContent = 'Yeni Uçuş Ekle';
                kaydetBtn.textContent = 'Kaydet';
                
                // Varsa seçili eleman işaretini kaldır
                const seciliLi = ucusListesi.querySelector('li.selected');
                if (seciliLi) seciliLi.classList.remove('selected');
            }

            // ID'si verilen uçuşun bilgileriyle formu doldurur
            function formuDoldur(id) {
                const ucus = ucuslar.find(u => u._id === id);
                if (!ucus) return;

                document.getElementById('ucusId').value = ucus._id;
                document.getElementById('ucusTarihi').value = new Date(ucus.ucusTarihi).toISOString().split('T')[0];
                document.getElementById('havaAraciTipi').value = ucus.havaAraciTipi;
                document.getElementById('ucusTipi').value = ucus.ucusTipi;
                document.getElementById('ucusSaati').value = ucus.ucusSaati;

                formBaslik.textContent = 'Uçuşu Güncelle';
                kaydetBtn.textContent = 'Güncelle';
                renderUcuslar(); // Seçimi göstermek için listeyi yeniden çiz

            }

            // 3. CRUD (Oluştur, Oku, Güncelle, Sil) İŞLEMLERİ
            //------------------------------------------------

            // Bir uçuşu siler
            async function ucusSil(id) {
                const token = localStorage.getItem('token');
                try {
                    const response = await fetch(`/api/flights/${id}`, {
                        method: 'DELETE',
                        headers: { 'x-auth-token': token }
                    });
                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.message || 'Silme işlemi başarısız.');
                    }
                    await verileriYukle(); // Listeyi yeniden yükle
                } catch (error) {
                    console.error("Silme hatası:", error);
                }

                formuTemizle();
            }

            // 4. EVENT LISTENERS (OLAY DİNLEYİCİLER)
            //-----------------------------------------

            // Form gönderildiğinde (Kaydet/Güncelle butonuna basıldığında)
            ucusForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const id = ucusIdInput.value;
                const ucusVerisi = {
                    ucusTarihi: document.getElementById('ucusTarihi').value,
                    havaAraciTipi: document.getElementById('havaAraciTipi').value,
                    ucusTipi: document.getElementById('ucusTipi').value,
                    ucusSaati: document.getElementById('ucusSaati').value,
                };

                let sonuc;
                if (id) { // ID varsa güncelleme yapılıyor
                    sonuc = await verileriKaydet(ucusVerisi, 'PUT', id);
                    // Mevcut uçuşu listede bul ve güncelle
                    const index = ucuslar.findIndex(u => u._id === id);
                    if (index !== -1) ucuslar[index] = sonuc;

                } else { // ID yoksa yeni kayıt yapılıyor
                    sonuc = await verileriKaydet(ucusVerisi, 'POST');
                    // Yeni uçuşu listeye ekle
                    ucuslar.push(sonuc);
                }

                renderUcuslar(); // Listeyi yeniden çiz
                if (sonuc && sonuc._id) {
                    formuDoldur(sonuc._id); // Formu güncel veriyle doldur ve seçili göster
                }
            });

            // "Yeni Kayıt" butonuna basıldığında
            yeniBtn.addEventListener('click', formuTemizle);

            // Hazır saat seçme butonu
            saatSecBtn.addEventListener('click', () => {
                saatSecenekleri.style.display = saatSecenekleri.style.display === 'block' ? 'none' : 'block';
            });

            // Hazır saat seçeneklerinden birine tıklama
            saatSecenekleri.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') {
                    ucusSaatiInput.value = e.target.dataset.saat;
                    saatSecenekleri.style.display = 'none';
                }
            });

            // Dışarıya tıklanınca saat seçeneklerini kapat
            document.addEventListener('click', (e) => {
                if (!saatSecBtn.contains(e.target) && !saatSecenekleri.contains(e.target)) {
                    saatSecenekleri.style.display = 'none';
                }
            });

            // --- Auth Event Listeners ---
            let isLoginMode = true;

            function toggleAuthMode(e) {
                e.preventDefault();
                isLoginMode = !isLoginMode;
                authTitle.textContent = isLoginMode ? 'Giriş Yap' : 'Kayıt Ol';
                authSubmitBtn.textContent = isLoginMode ? 'Giriş Yap' : 'Kayıt Ol';
                
                const switchLink = document.getElementById('auth-switch-link');
                if (isLoginMode) {
                    authSwitchText.firstChild.textContent = 'Hesabın yok mu? ';
                    switchLink.textContent = 'Kayıt Ol';
                } else {
                    authSwitchText.firstChild.textContent = 'Zaten hesabın var mı? ';
                    switchLink.textContent = 'Giriş Yap';
                }
            }
            authContainer.addEventListener('click', (e) => {
                if (e.target.id === 'auth-switch-link') {
                    toggleAuthMode(e);
                }
            });

            authForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                authError.textContent = '';
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';

                authSubmitBtn.disabled = true;
                authSubmitBtn.textContent = 'İşlem Sürüyor...';

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.message);
                    }
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    uygulamayiGoster();
                } catch (err) {
                    authError.textContent = err.message;
                } finally {
                    authSubmitBtn.disabled = false;
                    authSubmitBtn.textContent = isLoginMode ? 'Giriş Yap' : 'Kayıt Ol';
                }
            });

            logoutBtn.addEventListener('click', cikisYap);

            function cikisYap() {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                authContainer.style.display = 'block';
                appContainer.style.display = 'none';
                ucuslar = [];
                renderUcuslar();
            }

            function uygulamayiGoster() {
                const user = JSON.parse(localStorage.getItem('user'));
                if (user) {
                    welcomeUser.textContent = `Hoş geldin, ${user.username}`;
                    authContainer.style.display = 'none';
                    appContainer.style.display = 'block';
                    verileriYukle();
                }
            }


            // Tema değiştirme butonu
            themeToggleBtn.addEventListener('click', temaDegistir);

            // Kayıtlı Uçuşlar başlığına tıklayınca listeyi gizle/göster
            listContainerH3.addEventListener('click', () => {
                if (ucusListesi.style.maxHeight && ucusListesi.style.maxHeight !== '0px') {
                    ucusListesi.style.maxHeight = '0px';
                    ucusListesi.style.marginTop = '0';
                } else {
                    ucusListesi.style.maxHeight = '500px'; // veya daha büyük bir değer
                    ucusListesi.style.marginTop = '10px';
                }
            });

            // 5. UYGULAMAYI BAŞLAT
            //----------------------
            function init() {
                // Kayıtlı temayı yükle
                const kayitliTema = localStorage.getItem('ucusDefteriTemasi') || 'light';
                temaUygula(kayitliTema);

                const token = localStorage.getItem('token');
                if (token) {
                    uygulamayiGoster();
                } else {
                    authContainer.style.display = 'block';
                    appContainer.style.display = 'none';
                }
            }

            init();
        });
    </script>

</body>
</html>
